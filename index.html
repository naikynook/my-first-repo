<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kody Naiker</title>
  <link rel="stylesheet" href="style.css?v=20260703-1508">
</head>
<body>
  <header class="top-interface">
    <a class="site-name" href="#" aria-label="Home">Kody Naiker</a>

    <nav class="view-nav" aria-label="View controls">
      <button type="button" data-view="list">List View</button>
      <button class="is-active" type="button" data-view="gallery">Gallery View</button>
      <button type="button" data-apps>Apps</button>
    </nav>
  </header>

  <nav class="filter-pill" aria-label="Portfolio filters">
    <button class="is-active" type="button" data-filter="all">All</button>
    <button type="button" data-filter="projects">Projects</button>
    <button type="button" data-filter="academic">Academic</button>
    <button type="button" data-filter="professional">Professional</button>
    <button type="button" data-about>About</button>
  </nav>

  <main>
    <section class="project-stage gallery-view" aria-label="Project gallery">
      <article class="project-card card-a" data-category="projects academic">
        <a href="#">
          <span class="project-image image-atlas"></span>
          <span class="project-label">atlas-study</span>
        </a>
      </article>

      <article class="project-card card-b" data-category="projects academic">
        <a href="#">
          <span class="project-image image-installation"></span>
          <span class="project-label">spatial-index</span>
        </a>
      </article>

      <article class="project-card card-c" data-category="projects professional">
        <a href="#">
          <span class="project-image image-drawing"></span>
          <span class="project-label">drawing-system</span>
        </a>
      </article>

      <article class="project-card card-d" data-category="projects academic">
        <a href="#">
          <span class="project-image image-projection"></span>
          <span class="project-label">light-archive</span>
        </a>
      </article>

      <article class="project-card card-e" data-category="projects professional">
        <a href="#">
          <span class="project-image image-grid"></span>
          <span class="project-label">interface-study</span>
        </a>
      </article>

      <article class="project-card card-f" data-category="projects academic professional">
        <a href="#">
          <span class="project-image image-map"></span>
          <span class="project-label">material-map</span>
        </a>
      </article>

      <article class="project-card card-g" data-category="projects professional">
        <a href="#">
          <span class="project-image image-model"></span>
          <span class="project-label">model-room</span>
        </a>
      </article>
    </section>
  </main>

  <aside class="about-panel" aria-label="About">
    <p>A minimal portfolio archive for browsing selected work through gallery and list views.</p>
  </aside>

  <aside class="apps-panel" aria-label="Apps">
    <a href="#">notes.local</a>
    <a href="#">archive.local</a>
    <a href="#">viewer.local</a>
  </aside>

  <button class="reset-mark" type="button" aria-label="Reset view">×</button>

  <script src="script.js?v=20260703-1508"></script>
</body>
</html>
